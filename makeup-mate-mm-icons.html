<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>妆搭 Makeup Mate - MM App Icon</title>
    <style>
      :root {
        --theme-red: #a94b58;
        --theme-red-dark: #7f2f3b;
        --theme-red-soft: #c56a75;
        --white: #ffffff;
        --page: #f7f2ef;
        --text: #4c3034;
        --muted: #876a6c;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        display: grid;
        place-items: center;
        background: var(--page);
        color: var(--text);
        font-family: "Avenir Next", "Helvetica Neue", Helvetica, Arial, sans-serif;
      }

      main {
        width: min(760px, calc(100% - 32px));
        padding: 56px 0;
        display: grid;
        justify-items: center;
        gap: 28px;
      }

      .app-icon {
        position: relative;
        display: grid;
        place-items: center;
        width: min(72vw, 360px);
        aspect-ratio: 1;
        border-radius: 26%;
        background: var(--white);
        overflow: hidden;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.9),
          inset 0 -18px 42px rgba(169, 75, 88, 0.035),
          0 28px 60px rgba(91, 48, 52, 0.12);
      }

      .mm {
        position: relative;
        display: block;
        transform: translateY(-1%);
        color: transparent;
        background: linear-gradient(142deg, #c76f79 0%, #ad505d 42%, #8b3441 100%);
        -webkit-background-clip: text;
        background-clip: text;
        font-family:
          "Arial Rounded MT Bold",
          "SF Pro Rounded",
          "Avenir Next Rounded",
          "Nunito",
          "Quicksand",
          Arial,
          sans-serif;
        font-size: clamp(124px, 29vw, 216px);
        font-weight: 900;
        line-height: 0.78;
        letter-spacing: -0.205em;
        white-space: nowrap;
        font-variant-ligatures: none;
        text-shadow:
          0 1px 0 rgba(255, 235, 232, 0.28),
          0 7px 13px rgba(127, 47, 59, 0.2),
          0 18px 30px rgba(127, 47, 59, 0.13);
      }

      .mm::before {
        content: "MM";
        position: absolute;
        inset: 0;
        z-index: -1;
        color: #81313d;
        transform: translate(6px, 7px);
        filter: blur(3px);
        opacity: 0.3;
      }

      .mm::after {
        content: "MM";
        position: absolute;
        inset: 0;
        background: linear-gradient(170deg, rgba(255, 228, 225, 0.44) 0%, rgba(255, 228, 225, 0.16) 42%, transparent 70%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        opacity: 0.55;
        pointer-events: none;
      }

      .caption {
        display: grid;
        justify-items: center;
        gap: 8px;
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: 22px;
        font-weight: 600;
        letter-spacing: 0;
      }

      p {
        max-width: 460px;
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.65;
      }

      .sizes {
        display: flex;
        align-items: end;
        justify-content: center;
        gap: 14px;
        margin-top: 4px;
      }

      .mini {
        display: grid;
        place-items: center;
        aspect-ratio: 1;
        border-radius: 24%;
        background: var(--white);
        color: var(--theme-red);
        font-family:
          "Arial Rounded MT Bold",
          "SF Pro Rounded",
          "Avenir Next Rounded",
          "Nunito",
          "Quicksand",
          Arial,
          sans-serif;
        font-weight: 900;
        letter-spacing: -0.205em;
        box-shadow: 0 10px 24px rgba(91, 48, 52, 0.12);
      }

      .mini.large {
        width: 64px;
        font-size: 39px;
      }

      .mini.small {
        width: 40px;
        font-size: 24px;
      }

      @media (max-width: 520px) {
        main {
          padding: 36px 0;
        }

        .app-icon {
          width: min(84vw, 320px);
        }

        .mm {
          font-size: clamp(112px, 32vw, 190px);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="app-icon" role="img" aria-label="白色背景主题红色圆润 MM App 图标">
        <span class="mm">MM</span>
      </div>

      <div class="caption">
        <h1>妆搭 Makeup Mate</h1>
        <p>白色背景，无边框；MM 使用圆润厚实字形，主题红色呈现，保留轻微软胶立体感与柔和阴影。</p>
        <div class="sizes" aria-label="小尺寸预览">
          <span class="mini large">MM</span>
          <span class="mini small">MM</span>
        </div>
      </div>
    </main>
  </body>
</html>
