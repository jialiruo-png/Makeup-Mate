name: Deploy to Aliyun ECS

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  group: deploy-aliyun
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH 部署
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e
            cd /opt/makeup-mate
            ./deploy/deploy.sh
